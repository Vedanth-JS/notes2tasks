name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install black ruff isort pytest pytest-cov
        
    - name: Format with black and isort
      run: |
        black --check .
        isort --check-only .
        
    - name: Lint with ruff
      run: |
        ruff check .
        
    - name: Run tests
      run: |
        pytest tests/ --cov=src
